services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imageserver-app
    ports:
      - "5173:5173"
      - "3001:3001"
    environment:
      - DOCUMENTS_PATH=/host-documents
    volumes:
      - "${USERPROFILE}/Documents:/host-documents:ro"
    restart: unless-stopped
